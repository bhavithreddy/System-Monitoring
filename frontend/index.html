<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SysMonitor — System Health Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #09090b;
      --surface:     #111114;
      --surface-2:   #18181c;
      --border:      #27272a;
      --border-2:    #3f3f46;
      --text:        #e4e4e7;
      --muted:       #71717a;
      --green:       #22c55e;
      --yellow:      #eab308;
      --red:         #ef4444;
      --blue:        #3b82f6;
      --cyan:        #06b6d4;
      --accent:      #a78bfa;
      --font-mono:   'Space Mono', monospace;
      --font-display:'Syne', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Scanline overlay ───────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.07) 2px,
        rgba(0,0,0,.07) 4px
      );
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .shell { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 48px; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px; border: 1.5px solid var(--accent);
      border-radius: 6px; display: grid; place-items: center; position: relative;
    }
    .logo-icon::after {
      content: '⬡';
      color: var(--accent);
      font-size: 18px;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(.9); }
    }
    .logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
    .logo-text span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 16px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2s step-end infinite;
    }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .refresh-btn {
      background: transparent; border: 1px solid var(--border-2);
      color: var(--muted); padding: 6px 14px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 11px; cursor: pointer;
      letter-spacing: .04em; text-transform: uppercase;
      transition: all .15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Timestamp bar ───────────────────────────────────────────────────── */
    .timebar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted); letter-spacing: .05em;
      text-transform: uppercase;
    }
    .timebar .sep { color: var(--border-2); }
    #ts-last-updated { color: var(--cyan); }
    #ts-next-refresh  { color: var(--accent); }

    /* ── Error banner ────────────────────────────────────────────────────── */
    .error-banner {
      display: none; margin-top: 20px; padding: 12px 16px;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3);
      border-radius: 6px; color: var(--red); font-size: 12px;
    }
    .error-banner.show { display: flex; align-items: center; gap: 8px; }

    /* ── Main grid ───────────────────────────────────────────────────────── */
    .grid { display: grid; gap: 16px; margin-top: 24px; }
    .grid-top { grid-template-columns: repeat(3, 1fr); }
    .grid-bottom { grid-template-columns: 1fr 1fr; }

    @media (max-width: 900px) {
      .grid-top    { grid-template-columns: 1fr 1fr; }
      .grid-bottom { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .grid-top { grid-template-columns: 1fr; }
    }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px;
      transition: border-color .2s;
      animation: fadeUp .4s ease both;
    }
    .card:hover { border-color: var(--border-2); }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card-label {
      font-family: var(--font-display); font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-label::before {
      content: ''; display: block; width: 3px; height: 12px;
      border-radius: 2px; background: currentColor;
    }

    /* ── Gauge (CPU / Mem / Disk) ────────────────────────────────────────── */
    .gauge-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .gauge {
      position: relative; width: 120px; height: 120px;
    }
    .gauge svg { transform: rotate(-90deg); }
    .gauge-bg   { fill: none; stroke: var(--surface-2); stroke-width: 10; }
    .gauge-fill {
      fill: none; stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 339.3; /* 2π×54 */
      stroke-dashoffset: 339.3;
      transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1), stroke .4s;
    }
    .gauge-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .gauge-pct {
      font-family: var(--font-display); font-size: 26px; font-weight: 800;
      line-height: 1;
    }
    .gauge-unit { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .gauge-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; width: 100%;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 13px; font-weight: 700; }
    .stat-key   { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 1px; }

    /* ── Color states ────────────────────────────────────────────────────── */
    .c-green  { color: var(--green); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }
    .c-blue   { color: var(--blue); }
    .c-cyan   { color: var(--cyan); }
    .c-muted  { color: var(--muted); }

    /* ── Network card ────────────────────────────────────────────────────── */
    .net-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .net-row:last-child { border-bottom: none; }
    .net-key  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .net-val  { font-size: 13px; font-weight: 700; }
    .net-indicator {
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Services table ──────────────────────────────────────────────────── */
    .svc-table { width: 100%; border-collapse: collapse; }
    .svc-table tr { border-bottom: 1px solid var(--border); }
    .svc-table tr:last-child { border-bottom: none; }
    .svc-table td { padding: 9px 4px; vertical-align: middle; }
    .svc-name { font-size: 12px; }
    .svc-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 3px; font-weight: 700;
    }
    .svc-tag.active   { background: rgba(34,197,94,.12);  color: var(--green);  border: 1px solid rgba(34,197,94,.25); }
    .svc-tag.inactive { background: rgba(239,68,68,.10);  color: var(--red);    border: 1px solid rgba(239,68,68,.2); }
    .svc-tag.unknown  { background: rgba(113,113,122,.1); color: var(--muted);  border: 1px solid var(--border); }

    /* ── Process table ───────────────────────────────────────────────────── */
    .proc-table { width: 100%; border-collapse: collapse; }
    .proc-table thead tr { border-bottom: 1px solid var(--border-2); }
    .proc-table thead td {
      font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); padding: 4px 6px 8px;
    }
    .proc-table tbody tr { border-bottom: 1px solid var(--border); }
    .proc-table tbody tr:last-child { border-bottom: none; }
    .proc-table tbody td { padding: 8px 6px; font-size: 12px; vertical-align: middle; }
    .proc-cmd { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mini-bar-wrap {
      width: 60px; height: 5px; background: var(--surface-2);
      border-radius: 3px; overflow: hidden;
    }
    .mini-bar { height: 100%; border-radius: 3px; transition: width .5s; }

    /* ── Loading skeleton ────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">Sys<span>Monitor</span></div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-label">Connecting…</span>
      </div>
      <button class="refresh-btn" onclick="fetchMetrics()">↺ Refresh</button>
    </div>
  </header>

  <!-- Timestamp bar -->
  <div class="timebar">
    <span>Last updated:</span>
    <span id="ts-last-updated">—</span>
    <span class="sep">|</span>
    <span>Next refresh in:</span>
    <span id="ts-next-refresh">—</span>
    <span class="sep">|</span>
    <span>Host:</span>
    <span id="ts-host" style="color:var(--text)">—</span>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="error-banner">⚠ <span id="error-msg"></span></div>

  <!-- ── Top Row: CPU / Memory / Disk ────────────────────────────────── -->
  <div class="grid grid-top">

    <!-- CPU -->
    <div class="card">
      <div class="card-label">CPU Usage</div>
      <div class="gauge-wrap">
        <div class="gauge">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle class="gauge-bg"   cx="60" cy="60" r="54"/>
            <circle class="gauge-fill" cx="60" cy="60" r="54" id="cpu-arc"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-pct" id="cpu-pct">—</div>
            <div class="gauge-unit">percent</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Memory -->
    <div class="card">
      <div class="card-label">Memory Usage</div>
      <div class="gauge-wrap">
        <div class="gauge">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle class="gauge-bg"   cx="60" cy="60" r="54"/>
            <circle class="gauge-fill" cx="60" cy="60" r="54" id="mem-arc"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-pct" id="mem-pct">—</div>
            <div class="gauge-unit">percent</div>
          </div>
        </div>
        <div class="gauge-stats">
          <div class="stat-item">
            <div class="stat-value" id="mem-used">—</div>
            <div class="stat-key">Used</div>
          </div>
          <div class="stat-item">
            <div class="stat-value c-muted" id="mem-total">—</div>
            <div class="stat-key">Total</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Disk -->
    <div class="card">
      <div class="card-label">Disk Usage ( / )</div>
      <div class="gauge-wrap">
        <div class="gauge">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle class="gauge-bg"   cx="60" cy="60" r="54"/>
            <circle class="gauge-fill" cx="60" cy="60" r="54" id="disk-arc"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-pct" id="disk-pct">—</div>
            <div class="gauge-unit">percent</div>
          </div>
        </div>
        <div class="gauge-stats">
          <div class="stat-item">
            <div class="stat-value" id="disk-used">—</div>
            <div class="stat-key">Used</div>
          </div>
          <div class="stat-item">
            <div class="stat-value c-muted" id="disk-total">—</div>
            <div class="stat-key">Total</div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /grid-top -->

  <!-- ── Bottom Row: Network + Services  |  Processes ──────────────── -->
  <div class="grid grid-bottom" style="margin-top:16px">

    <!-- Left column: Network + Services stacked -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Network -->
      <div class="card">
        <div class="card-label">Network</div>
        <div class="net-row">
          <span class="net-key">Status</span>
          <span class="net-val net-indicator">
            <span class="status-dot" id="net-dot" style="animation:none"></span>
            <span id="net-status">—</span>
          </span>
        </div>
        <div class="net-row">
          <span class="net-key">Latency</span>
          <span class="net-val" id="net-latency">—</span>
        </div>
        <div class="net-row">
          <span class="net-key">Interface</span>
          <span class="net-val c-cyan" id="net-iface">—</span>
        </div>
      </div>

      <!-- Services -->
      <div class="card">
        <div class="card-label">Services</div>
        <table class="svc-table" id="services-table">
          <tbody>
            <tr><td colspan="2" class="c-muted" style="font-size:11px">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Processes -->
    <div class="card">
      <div class="card-label">Top Processes (CPU)</div>
      <table class="proc-table" id="proc-table">
        <thead>
          <tr>
            <td>PID</td>
            <td>User</td>
            <td>Command</td>
            <td>CPU%</td>
            <td></td>
            <td>MEM%</td>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6" class="c-muted" style="font-size:11px;padding:12px 6px">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div><!-- /grid-bottom -->

</div><!-- /shell -->

<script>
// ── Config ────────────────────────────────────────────────────────────────
const API_BASE      = 'http://localhost:5000';
const REFRESH_MS    = 4000;   // 4-second auto-refresh

// ── State ─────────────────────────────────────────────────────────────────
let countdown = REFRESH_MS / 1000;
let lastTimestamp = null;

// ── Colour helper ─────────────────────────────────────────────────────────
function thresholdColor(pct) {
  if (pct >= 90) return 'var(--red)';
  if (pct >= 70) return 'var(--yellow)';
  return 'var(--green)';
}
function thresholdClass(pct) {
  if (pct >= 90) return 'c-red';
  if (pct >= 70) return 'c-yellow';
  return 'c-green';
}

// ── Gauge updater ─────────────────────────────────────────────────────────
// stroke-dasharray circumference = 2π×54 ≈ 339.3
const CIRCUMFERENCE = 2 * Math.PI * 54;

function updateGauge(arcId, pctId, pct, suffix = '%') {
  const arc = document.getElementById(arcId);
  const label = document.getElementById(pctId);
  const offset = CIRCUMFERENCE * (1 - Math.min(pct, 100) / 100);
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = thresholdColor(pct);
  label.textContent = pct + suffix;
  label.className = `gauge-pct ${thresholdClass(pct)}`;
}

// ── Mini bar ───────────────────────────────────────────────────────────────
function miniBar(pct, color) {
  return `<div class="mini-bar-wrap"><div class="mini-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>`;
}

// ── Render metrics ─────────────────────────────────────────────────────────
function renderMetrics(d) {
  // CPU
  updateGauge('cpu-arc', 'cpu-pct', d.cpu.usage_pct);

  // Memory
  updateGauge('mem-arc', 'mem-pct', d.memory.usage_pct);
  document.getElementById('mem-used').textContent  = d.memory.used_mb + ' MB';
  document.getElementById('mem-total').textContent = d.memory.total_mb + ' MB';

  // Disk
  updateGauge('disk-arc', 'disk-pct', d.disk.usage_pct);
  document.getElementById('disk-used').textContent  = d.disk.used;
  document.getElementById('disk-total').textContent = d.disk.total;

  // Network
  const netUp = d.network.status === 'up';
  const netDot = document.getElementById('net-dot');
  netDot.className = `status-dot${netUp ? '' : ' error'}`;
  document.getElementById('net-status').textContent  = d.network.status.toUpperCase();
  document.getElementById('net-status').className    = `net-val ${netUp ? 'c-green' : 'c-red'}`;
  const lat = d.network.latency_ms;
  document.getElementById('net-latency').textContent = (lat && lat !== 'N/A') ? lat + ' ms' : 'N/A';
  document.getElementById('net-iface').textContent   = d.network.interface || 'N/A';

  // Services
  const svcTbody = document.querySelector('#services-table tbody');
  if (d.services && d.services.length > 0) {
    svcTbody.innerHTML = d.services.map(s => `
      <tr>
        <td class="svc-name">${escHtml(s.name)}</td>
        <td style="text-align:right">
          <span class="svc-tag ${s.status}">${s.status}</span>
        </td>
      </tr>`).join('');
  } else {
    svcTbody.innerHTML = '<tr><td colspan="2" class="c-muted" style="font-size:11px">No services configured</td></tr>';
  }

  // Processes
  const procTbody = document.querySelector('#proc-table tbody');
  if (d.top_processes && d.top_processes.length > 0) {
    procTbody.innerHTML = d.top_processes.map(p => {
      const cpuColor = thresholdColor(p.cpu);
      const memColor = thresholdColor(p.mem);
      return `<tr>
        <td class="c-muted">${p.pid}</td>
        <td class="c-cyan">${escHtml(p.user)}</td>
        <td class="proc-cmd" title="${escHtml(p.cmd)}">${escHtml(p.cmd)}</td>
        <td class="${thresholdClass(p.cpu)}">${p.cpu.toFixed(1)}%</td>
        <td>${miniBar(p.cpu, cpuColor)}</td>
        <td class="c-muted">${p.mem.toFixed(1)}%</td>
      </tr>`;
    }).join('');
  } else {
    procTbody.innerHTML = '<tr><td colspan="6" class="c-muted" style="font-size:11px;padding:12px 6px">No process data</td></tr>';
  }

  // Timestamp
  const ts = new Date(d.timestamp);
  lastTimestamp = ts;
  document.getElementById('ts-last-updated').textContent =
    ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  // Warning banner
  if (d._warning) {
    showError(d._warning, false);
  } else {
    hideError();
  }

  // Status dot
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('status-label').textContent = 'Live';
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchMetrics() {
  try {
    const res = await fetch(`${API_BASE}/metrics`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderMetrics(data);
    countdown = REFRESH_MS / 1000;
  } catch (err) {
    showError(`Cannot reach API at ${API_BASE} — ${err.message}`);
    document.getElementById('status-dot').className = 'status-dot error';
    document.getElementById('status-label').textContent = 'Disconnected';
  }
}

// ── Error helpers ─────────────────────────────────────────────────────────
function showError(msg, isError = true) {
  const el = document.getElementById('error-banner');
  document.getElementById('error-msg').textContent = msg;
  el.classList.add('show');
  if (isError) el.style.borderColor = 'rgba(239,68,68,.3)';
  else         el.style.borderColor = 'rgba(234,179,8,.3)';
}
function hideError() {
  document.getElementById('error-banner').classList.remove('show');
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Countdown ticker ───────────────────────────────────────────────────────
setInterval(() => {
  countdown = Math.max(0, countdown - 1);
  document.getElementById('ts-next-refresh').textContent = countdown + 's';
}, 1000);

// ── Auto-refresh ───────────────────────────────────────────────────────────
setInterval(fetchMetrics, REFRESH_MS);

// ── Boot ───────────────────────────────────────────────────────────────────
fetchMetrics();
</script>
</body>
</html>
